const fadeIn={hidden:{opacity:0},visible:{opacity:1,transition:{duration:0.6}}};

/* ============================================================
   SCROLL ANIMATED SECTION WRAPPER
   ============================================================ */
function AnimSection({children,className="",variants=fadeUp,viewport={once:true,amount:0.2},...props}){
  return(
    <m.div initial="hidden" whileInView="visible" viewport={viewport} variants={variants} className={className} {...props}>
      {children}
    </m.div>
  );
}

/* ============================================================
   NAVBAR
   ============================================================ */
function Navbar(){
  const[scrolled,setScrolled]=useState(false);
  const[menuOpen,setMenuOpen]=useState(false);
  const{scrollY}=useScroll();

  useMotionValueEvent(scrollY,"change",(latest)=>{
    setScrolled(latest>40);
  });

  const links=[
    {label:"Home",href:"#home"},
    {label:"About",href:"#about"},
    {label:"Programs",href:"#programs"},
    {label:"Trainer",href:"#trainer"},
    {label:"Testimonials",href:"#testimonials"},
    {label:"Contact",href:"#contact"},
  ];

  return(
    <m.nav initial={{y:-100}} animate={{y:0}} transition={{duration:0.6,ease:[0.22,0.61,0.36,1]}}
      className={`fixed top-0 left-0 w-full z-50 transition-all duration-500 ${scrolled?"glass border-b border-brand-border shadow-lg shadow-black/20 py-3":"py-5"}`}>
      <div className="max-w-7xl mx-auto px-5 md:px-8 flex items-center justify-between">
        <a href="#home" className="font-body text-lg tracking-[0.2em] uppercase text-brand-ivory font-semibold">
          Ann<span className="text-brand-red">Fit</span> Studio
        </a>
        <div className="hidden md:flex items-center gap-8">
          {links.map(l=>(
            <m.a key={l.href} href={l.href}
              whileHover={{y:-2}} transition={{duration:0.2}}
              className="text-[0.8rem] uppercase tracking-[0.08em] text-brand-beige hover:text-brand-gold transition-colors duration-300 relative group cursor-pointer">
              {l.label}
              <span className="absolute -bottom-1 left-0 w-0 h-px bg-brand-gold transition-all duration-300 group-hover:w-full"/>
            </m.a>
          ))}
        </div>
        <button onClick={()=>setMenuOpen(!menuOpen)} className="md:hidden text-brand-ivory p-2 -mr-2 cursor-pointer" aria-label="Toggle menu">
          {menuOpen ? <Icons.X/>:<Icons.Menu/>}
        </button>
      </div>
      <AnimatePresence>
        {menuOpen&&(
          <m.div initial={{opacity:0,clipPath:"inset(0 0 0 100%)"}} animate={{opacity:1,clipPath:"inset(0 0 0 0)"}} exit={{opacity:0,clipPath:"inset(0 0 0 100%)"}}
            transition={{duration:0.4,ease:[0.22,0.61,0.36,1]}}
            className="md:hidden fixed inset-0 top-0 bg-brand-black/98 backdrop-blur-xl z-40 flex flex-col items-center justify-center gap-8">
            {links.map((l,i)=>(
              <m.a key={l.href} href={l.href} onClick={()=>setMenuOpen(false)}
                initial={{opacity:0,y:20}} animate={{opacity:1,y:0}} transition={{delay:i*0.08}}
                className="text-2xl font-display text-brand-ivory hover:text-brand-gold transition-colors duration-300">
                {l.label}
              </m.a>
            ))}
          </m.div>
        )}
      </AnimatePresence>
    </m.nav>
  );
}

function Hero(){
  const[slideIdx,setSlideIdx]=useState(0);
  const{scrollY}=useScroll();
  const opacity=useTransform(scrollY,[0,600],[1,0]);
  const y=useTransform(scrollY,[0,600],[0,100]);

  useEffect(()=>{
    if(siteData.heroSlides.length<2)return;
    const t=setInterval(()=>setSlideIdx(p=>(p+1)%siteData.heroSlides.length),5000);
    return()=>clearInterval(t);
  },[]);

  return(
    <section id="home" className="relative h-[100dvh] min-h-[600px] flex items-center overflow-hidden">
      {siteData.heroSlides.map((src,i)=>(
        <div key={i} className={`absolute inset-0 bg-cover bg-center transition-opacity duration-[1800ms] ease-in-out ${i===slideIdx?"opacity-100":"opacity-0"}`}
          style={{backgroundImage:`url('${src}')`}}/>
      ))}
      <div className="absolute inset-0 hero-gradient z-[1]"/>
      <div className="absolute inset-0 bg-gradient-to-t from-brand-black via-transparent to-brand-black/30 z-[1]"/>

      <m.div style={{opacity,y}} className="relative z-10 max-w-7xl mx-auto px-6 md:px-8 w-full">
        <div className="max-w-2xl">
          <m.div initial={{opacity:0,y:20}} animate={{opacity:1,y:0}} transition={{delay:0.3,duration:0.6}}>
            <span className="inline-block font-body text-[0.7rem] tracking-[0.3em] uppercase text-brand-gold mb-6 border border-brand-gold/30 px-4 py-1.5 rounded-full">
              Premium Ladies-Only Studio
            </span>
          </m.div>
          <m.h1 initial={{opacity:0,y:30}} animate={{opacity:1,y:0}} transition={{delay:0.5,duration:0.7,ease:[0.22,0.61,0.36,1]}}
            className="font-display text-[clamp(2.8rem,9vw,6.5rem)] leading-[0.95] font-semibold text-brand-ivory tracking-tight">
            A higher standard<br/>of fitness.
          </m.h1>
          <m.div initial={{opacity:0,y:20}} animate={{opacity:1,y:0}} transition={{delay:0.8,duration:0.6}}>
            <m.a href="#programs" whileHover={{scale:1.03}} whileTap={{scale:0.97}}
              className="inline-flex items-center gap-3 mt-8 md:mt-10 px-8 py-4 border border-brand-goldSoft text-brand-ivory text-[0.75rem] tracking-[0.25em] uppercase font-medium hover:bg-brand-goldSoft hover:text-brand-black transition-all duration-500 cursor-pointer">
              Start Your Journey
              <Icons.ArrowRight/>
            </m.a>
          </m.div>
